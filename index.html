<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0F766E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>GesPer</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
</head>
<body>
<div id="app">

  <section id="sec-login" class="spa-section"></section>

  <div id="main-layout" class="main-layout hidden">

    <header id="topbar" class="topbar">
      <div class="topbar-inner">
        <div class="topbar-brand">
          <div class="topbar-logo-wrap"><img id="topbar-logo" src="" alt="" class="topbar-logo" style="display:none"/></div>
          <div class="topbar-titles">
            <span class="topbar-title" id="topbar-empresa">GesPer</span>
            <span class="topbar-sub" id="topbar-role-label">RH</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="btn-expres-top" title="Registro exprés">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
          <button class="topbar-btn" id="btn-cambiar-pwd" title="Cambiar contraseña">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
          <button class="topbar-btn" id="btn-logout" title="Cerrar sesión">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main id="main-content">
      <section id="sec-dashboard"   class="spa-section"></section>
      <section id="sec-incidencias" class="spa-section"></section>
      <section id="sec-actas"       class="spa-section"></section>
      <section id="sec-permisos"    class="spa-section"></section>
      <section id="sec-historial"   class="spa-section"></section>
      <section id="sec-personal"    class="spa-section"></section>
      <section id="sec-reportes"    class="spa-section"></section>
    <section id="sec-compromisos" class="spa-section"></section>
    <section id="sec-evaluacion" class="spa-section"></section>
    <section id="sec-clima"      class="spa-section"></section>
    <section id="sec-documentos"  class="spa-section"></section>
    </main>

    <!-- NAV INFERIOR — 5 botones -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-btn active" data-route="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Panel</span>
      </button>
      <button class="nav-btn" data-route="incidencias">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <span>Incidencia</span>
      </button>
      <button class="nav-btn" data-route="actas">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Actas</span>
      </button>
      <button class="nav-btn" data-route="permisos">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Permisos</span>
      </button>
      <button class="nav-btn" data-route="historial">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Historial</span>
      </button>
      <button class="nav-btn" data-route="evaluacion">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Eval.</span>
      </button>
      <button class="nav-btn" data-route="clima">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span>Clima</span>
      </button>
    </nav>

    <!-- MENÚ EXTRA ADMIN (accesible desde dashboard) -->
  </div>

  <!-- MODAL REGISTRO EXPRÉS -->
  <div id="modal-expres" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title">⚡ Registro Exprés</h2>
        <button class="modal-close" id="btn-close-expres">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Empleado</label>
          <input type="text" id="exp-empleado" class="field-input" placeholder="Buscar nombre..." autocomplete="off"/>
          <div id="exp-empleado-list" class="autocomplete-list hidden"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Tipo de incidencia</label>
          <select id="exp-tipo" class="field-input field-select">
            <option value="">— Seleccionar —</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Gravedad</label>
          <div id="exp-gravedad-display" class="gravedad-badge-lg">— selecciona tipo —</div>
        </div>
        <button class="btn-primary btn-full" id="btn-guardar-expres">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Guardar incidencia
        </button>
        <div class="timer-hint">⏱ Objetivo: menos de 30 segundos</div>
      </div>
    </div>
  </div>

  <!-- MODAL CAMBIAR CONTRASEÑA -->
  <div id="modal-password" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title">🔐 Cambiar contraseña</h2>
        <button class="modal-close" id="btn-close-pwd">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Contraseña actual</label>
          <input type="password" id="pwd-actual" class="field-input" placeholder="••••••••"/>
        </div>
        <div class="field-group">
          <label class="field-label">Nueva contraseña</label>
          <input type="password" id="pwd-nueva" class="field-input" placeholder="••••••••"/>
        </div>
        <div class="field-group">
          <label class="field-label">Confirmar nueva contraseña</label>
          <input type="password" id="pwd-confirmar" class="field-input" placeholder="••••••••"/>
        </div>
        <button class="btn-primary btn-full" id="btn-guardar-pwd">Guardar contraseña</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
